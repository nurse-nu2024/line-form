<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนบุคลากร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; padding: 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-navy { background-color: #0056b3; color: white; border-radius: 15px 15px 0 0; padding: 20px; text-align: center; }
        .btn-submit { background-color: #0056b3; color: white; border-radius: 10px; padding: 12px; width: 100%; border: none; font-weight: bold; transition: 0.3s; }
        .btn-submit:hover { background-color: #004494; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card mx-auto" style="max-width: 450px;">
        <div class="header-navy">
            <h4 class="mb-0">ลงทะเบียนบุคลากร</h4>
            <small>คณะพยาบาลศาสตร์ มรภ.อุบลราชธานี</small>
        </div>
        <div class="card-body p-4">
            <form id="regForm">
                <input type="hidden" id="userId">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
                    <input type="text" class="form-control" id="fullName" required placeholder="กรอกชื่อ-นามสกุลจริง">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">เบอร์โทรศัพท์</label>
                    <input type="tel" class="form-control" id="phone" required placeholder="08x-xxxxxxx">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">ประเภทบุคลากร</label>
                    <select class="form-select" id="role" required>
                        <option value="" disabled selected>-- เลือกประเภท --</option>
                        <option value="พนักงานมหาวิทยาลัยสายวิชาการ(อาจารย์)">พนักงานมหาวิทยาลัยสายวิชาการ(อาจารย์)</option>
                        <option value="อาจารย์คู่สัญญา">อาจารย์คู่สัญญา</option>
                        <option value="พนักงานมหาวิทยาลัยสายสนับสนุน">พนักงานมหาวิทยาลัยสายสนับสนุน</option>
                        <option value="ลูกจ้างชั่วคราว">ลูกจ้างชั่วคราว</option>
                        <option value="ลูกจ้างโครงการ">ลูกจ้างโครงการ</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit mt-3">ยืนยันการลงทะเบียน</button>
            </form>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const SCRIPT_URL = "ใส่ URL ของ Google Apps Script ตรงนี้";

        async function main() {
            await liff.init({ liffId: "ใส่ LIFF ID ตรงนี้" });
            if (!liff.isLoggedIn()) { 
                liff.login(); 
            } else { 
                const profile = await liff.getProfile(); 
                document.getElementById('userId').value = profile.userId; 
            }
        }
        main();

        // ใช้ addEventListener แทนการใช้ onclick ใน HTML
        document.getElementById('regForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                action: "register", // เพิ่ม action เพื่อให้หลังบ้านแยกแยะได้
                userId: document.getElementById('userId').value,
                fullName: document.getElementById('fullName').value,
                phone: document.getElementById('phone').value,
                role: document.getElementById('role').value
            };

            try {
                await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify(data) 
                });
                alert("ลงทะเบียนสำเร็จเรียบร้อยแล้วค่ะ");
                liff.closeWindow();
            } catch (error) {
                alert("เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง");
            }
        });
    </script>
</body>
</html>
