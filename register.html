<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนบุคลากร - คณะพยาบาลศาสตร์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f2f5; }
        .card { border: none; border-radius: 15px; }
        .bg-primary-custom { background-color: #0056b3; color: white; border-radius: 15px 15px 0 0; }
        .btn-primary { background-color: #0056b3; border: none; border-radius: 10px; padding: 10px; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="card shadow mx-auto" style="max-width: 450px;">
            <div class="card-header bg-primary-custom text-center py-4">
                <h4 class="mb-0">ลงทะเบียนเข้าใช้งาน</h4>
                <p class="small mb-0">สำนักงานคณบดี คณะพยาบาลศาสตร์</p>
            </div>
            <div class="card-body p-4">
                <div id="loading" class="text-center py-3">
                    <div class="spinner-border text-primary" role="status"></div>
                    <p class="mt-2">กำลังดึงข้อมูลจาก LINE...</p>
                </div>

                <form id="regForm" style="display: none;">
                    <div class="text-center mb-4">
                        <img id="pictureUrl" class="rounded-circle border shadow-sm" width="90" height="90">
                        <p id="displayName" class="mt-2 fw-bold text-dark"></p>
                    </div>

                    <input type="hidden" id="userId" name="userId">

                    <div class="mb-3">
                        <label class="form-label fw-bold">ชื่อ-นามสกุล</label>
                        <input type="text" class="form-control" id="fullName" name="fullName" placeholder="กรอกชื่อ-นามสกุลจริง" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">เบอร์โทรศัพท์</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="08x-xxxxxxx" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">บทบาทหน้าที่</label>
                        <select class="form-select" id="role" name="role">
                            <option value="เจ้าหน้าที่">เจ้าหน้าที่</option>
                            <option value="ผู้บริหาร">ผู้บริหาร</option>
                            <option value="เลขาคณบดี">เลขาคณบดี</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 shadow-sm">ยืนยันการลงทะเบียน</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const webAppUrl = "https://script.google.com/macros/s/AKfycbztt6kwFLBRpFgOyhon3YbyHWRc5eUM1x6yUyWh8EhBQ9QjKNXytZT6SG4IOcDWPq0/exec"; // URL จาก Google Apps Script (Deploy ล่าสุด)
        const liffId = "2009775892-l5k898kx"; // LIFF ID ตัวที่ 1

        async function main() {
            try {
                await liff.init({ liffId: liffId });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('userId').value = profile.userId;
                    document.getElementById('displayName').innerText = profile.displayName;
                    document.getElementById('pictureUrl').src = profile.pictureUrl;
                    document.getElementById('fullName').value = profile.displayName;
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('regForm').style.display = 'block';
                }
            } catch (err) {
                console.error('LIFF Error: ', err);
            }
        }
        main();

        document.getElementById('regForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());

            fetch(webAppUrl, {
                method: 'POST',
                body: JSON.stringify(data)
            }) 
            .then(res => {
                alert("ลงทะเบียนเรียบร้อยแล้วค่ะ");
                liff.closeWindow();
            })
            .catch(err => {
                alert("เกิดข้อผิดพลาด กรุณาลองใหม่");
                btn.disabled = false;
                btn.innerText = "ยืนยันการลงทะเบียน";
            });
        });
    </script>
</body>
</html>
