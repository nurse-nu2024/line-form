<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกภารกิจ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8f9fa; padding: 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-green { background-color: #00b900; color: white; border-radius: 15px 15px 0 0; padding: 20px; text-align: center; }
        .btn-save { background-color: #00b900; color: white; border-radius: 10px; padding: 12px; width: 100%; border: none; font-weight: bold; }
        .btn-save:hover { background-color: #009800; }
    </style>
</head>
<body>
    <div class="card mx-auto" style="max-width: 450px;">
        <div class="header-green">
            <h4 class="mb-0">บันทึกภารกิจรายวัน</h4>
        </div>
        <div class="card-body p-4">
            <form id="taskForm">
                <input type="hidden" id="userId">
                
                <div class="mb-3">
                    <label class="form-label fw-bold">ผู้ปฏิบัติงาน :</label>
                    <select id="operator" class="form-select" required>
                        <option value="">กำลังโหลดรายชื่อ...</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label fw-bold">วันที่ :</label>
                        <input type="date" id="date" class="form-control" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label fw-bold">เวลา :</label>
                        <input type="text" id="time" class="form-control" placeholder="10:00-12:00">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">กิจกรรม :</label>
                    <textarea id="activity" class="form-control" rows="2" placeholder="รายละเอียดงาน"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">สถานที่ :</label>
                    <input id="location" class="form-control" placeholder="เช่น ห้องประชุม 1">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">การแต่งกาย :</label>
                    <input id="dress" class="form-control" placeholder="เช่น ชุดสุภาพ">
                </div>

                <button type="submit" class="btn-save mt-2">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz55LDQpk-9jsNFhzvrkd-1j7BeLKr28a7e1sTDpMK79FotWzDgGOW_WwY5wqd1KoER/exec";

        async function main() {
            await liff.init({ liffId: "2009615586-ezA6vG8M" });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById("userId").value = profile.userId;
                loadNames(); // โหลดรายชื่อหลังจาก Login สำเร็จ
            } else {
                liff.login();
            }
        }
        main();

        // โหลดรายชื่อจาก Google Sheets
        function loadNames() {
            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getStaffNames" })
            })
            .then(res => res.json())
            .then(names => {
                const select = document.getElementById("operator");
                select.innerHTML = '<option value="">-- เลือกรายชื่อ --</option>';
                names.forEach(name => {
                    let opt = document.createElement("option");
                    opt.value = name; opt.text = name;
                    select.appendChild(opt);
                });
            })
            .catch(() => {
                document.getElementById("operator").innerHTML = '<option value="">โหลดข้อมูลไม่สำเร็จ</option>';
            });
        }

        // ส่งข้อมูลบันทึก
        document.getElementById('taskForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const data = {
                action: "saveTask",
                userId: document.getElementById("userId").value,
                operator: document.getElementById("operator").value,
                date: document.getElementById("date").value,
                time: document.getElementById("time").value,
                activity: document.getElementById("activity").value,
                location: document.getElementById("location").value,
                dress: document.getElementById("dress").value
            };

            try {
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
                alert("บันทึกภารกิจเรียบร้อยแล้วค่ะ");
                liff.closeWindow();
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการบันทึก");
            }
        });
    </script>
</body>
</html>
