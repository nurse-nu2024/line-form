<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>บันทึกภารกิจ</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
    h3 { color: #2c3e50; text-align: center; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background-color: #00b900; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
    button:hover { background-color: #009800; }
  </style>
</head>
<body>
  <h3>บันทึกภารกิจผู้บริหาร</h3>

  <div class="form-group">
    <label>ผู้ปฏิบัติ :</label>
    <select id="operator"><option value="">กำลังโหลดรายชื่อ...</option></select>
  </div>

  <div class="form-group">
    <label>วันที่ :</label>
    <input type="date" id="date">
  </div>

  <div class="form-group">
    <label>เวลา :</label>
    <input type="text" id="time" placeholder="เช่น 10.00 - 11.30">
  </div>

  <div class="form-group">
    <label>กิจกรรม :</label>
    <input id="activity">
  </div>

  <div class="form-group">
    <label>สถานที่ :</label>
    <input id="location">
  </div>

  <div class="form-group">
    <label>การแต่งกาย :</label>
    <input id="dress">
  </div>

  <button onclick="submitForm()">บันทึกข้อมูล</button>

  <script>
    let userId = "";
    // *** สำคัญ: นำ URL ที่ได้จากการ Deploy (New Deployment) มาวางที่นี่ ***
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxu8r2CeePVRbnbbJuw6tP9TAFIIeRs3k6ENH8PjjVFCpSPr_Cg9upcggSPyXJ0F8OY/exec";

    async function main() {
      await liff.init({ liffId: "2009615586-ezA6vG8M" });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        userId = profile.userId;
      } else {
        liff.login();
      }
      loadNames();
    }
    main();

    function loadNames() {
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getStaffNames" })
      })
      .then(res => res.json())
      .then(names => {
        const select = document.getElementById("operator");
        select.innerHTML = '<option value="">-- เลือกรายชื่อ --</option>';
        names.forEach(name => {
          let opt = document.createElement("option");
          opt.value = name; opt.text = name;
          select.appendChild(opt);
        });
      })
      .catch(err => {
        document.getElementById("operator").innerHTML = '<option value="">โหลดข้อมูลไม่สำเร็จ</option>';
      });
    }

    function submitForm() {
      const operator = document.getElementById("operator").value;
      if(!operator) { alert("กรุณาเลือกผู้ปฏิบัติงาน"); return; }

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          userId: userId,
          operator: operator,
          date: document.getElementById("date").value,
          time: document.getElementById("time").value,
          activity: document.getElementById("activity").value,
          location: document.getElementById("location").value,
          dress: document.getElementById("dress").value
        })
      }).then(() => {
        alert("บันทึกเรียบร้อยแล้วค่ะ");
        liff.closeWindow();
      });
    }
  </script>
</body>
</html>
